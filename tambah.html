<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tambah Siswa Baru</title>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>

  <!-- HEADER -->
  <div class="header">
    <div class="header-left">
      <button class="btn-back" onclick="window.location.href='index.html'">← Kembali</button>
      <h1 class="header-title">Tambah Siswa Baru</h1>
    </div>
  </div>

  <!-- FORM -->
  <div class="content">
    <div class="form-card">

      <!-- DATA PRIBADI -->
      <div class="section-title">
        <span>👤</span> Data Pribadi
      </div>

      <div class="form-group">
        <label>NAMA LENGKAP <span class="required">*</span></label>
        <input type="text" id="nama" placeholder="Masukkan nama lengkap"/>
      </div>

      <div class="form-group">
        <label>NIS (NOMOR INDUK SISWA) <span class="required">*</span></label>
        <input type="text" id="nis" placeholder="Contoh: 2024001"/>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>TEMPAT LAHIR</label>
          <input type="text" id="tempatLahir" placeholder="Kota"/>
        </div>
        <div class="form-group">
          <label>TANGGAL LAHIR</label>
          <input type="date" id="tanggalLahir"/>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>JENIS KELAMIN</label>
          <select id="jenisKelamin">
            <option value="">-- Pilih --</option>
            <option>Laki-laki</option>
            <option>Perempuan</option>
          </select>
        </div>
        <div class="form-group">
          <label>AGAMA</label>
          <select id="agama">
            <option value="">-- Pilih --</option>
            <option>Islam</option>
            <option>Kristen</option>
            <option>Katolik</option>
            <option>Hindu</option>
            <option>Buddha</option>
            <option>Konghucu</option>
          </select>
        </div>
      </div>

      <!-- DATA SEKOLAH -->
      <div class="section-title">
        <span>🏫</span> Data Sekolah
      </div>

      <div class="form-group">
        <label>KELAS</label>
        <input type="text" id="kelas" placeholder="Contoh: 10 IPA 1"/>
      </div>

      <!-- KONTAK -->
      <div class="section-title">
        <span>📞</span> Kontak
      </div>

      <div class="form-group">
        <label>NOMOR TELEPON SISWA</label>
        <input type="tel" id="telepon" placeholder="08xxxxxxxxxx"/>
      </div>

      <div class="form-group">
        <label>ALAMAT LENGKAP</label>
        <textarea id="alamat" placeholder="Jalan, RT/RW, Kelurahan, Kecamatan, Kota" rows="3"></textarea>
      </div>

      <!-- DATA ORANG TUA -->
      <div class="section-title">
        <span>👨‍👩‍👧</span> Data Orang Tua / Wali
      </div>

      <div class="form-group">
        <label>NAMA ORANG TUA / WALI</label>
        <input type="text" id="namaOrtu" placeholder="Nama ayah/ibu/wali"/>
      </div>

      <div class="form-group">
        <label>NO. TELEPON ORANG TUA / WALI</label>
        <input type="tel" id="teleponOrtu" placeholder="08xxxxxxxxxx"/>
      </div>

      <!-- TOMBOL -->
      <div class="form-actions">
        <button class="btn-batal" onclick="window.location.href='index.html'">Batal</button>
        <button class="btn-simpan" onclick="simpanSiswa()">💾 Simpan Data</button>
      </div>

    </div>
  </div>

  <script src="js/storage.js"></script>
  <script src="js/tambah.js"></script>
</body>
</html>
